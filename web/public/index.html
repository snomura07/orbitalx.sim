<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrbitalX Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>OrbitalX Simulator Dashboard</h1>
      <label class="window-select">
        Window
        <select id="windowSec">
          <option value="5">5s</option>
          <option value="10" selected>10s</option>
          <option value="30">30s</option>
          <option value="60">60s</option>
        </select>
      </label>
    </header>
    <main class="grid">
      <section class="card pose-card">
        <h2>Pose</h2>
        <div class="metric-row pose-primary">
          <div><span>X</span><strong id="poseX">-</strong></div>
          <div><span>Y</span><strong id="poseY">-</strong></div>
          <div><span>Theta</span><strong id="poseTheta">-</strong></div>
          <div><span>Velocity</span><strong id="velocityValue">-</strong></div>
          <div><span>Battery</span><strong id="batteryValue">-</strong></div>
        </div>
        <div class="pose-range">
          <label>X min <input id="xMin" type="number" value="-3000" step="100" /></label>
          <label>X max <input id="xMax" type="number" value="3000" step="100" /></label>
          <label>Y min <input id="yMin" type="number" value="-1000" step="100" /></label>
          <label>Y max <input id="yMax" type="number" value="1000" step="100" /></label>
        </div>
        <div class="pose-focus-row">
          <canvas id="poseChart" width="520" height="220"></canvas>
          <div class="side-gauges">
            <canvas id="velocityGauge" width="300" height="240"></canvas>
            <canvas id="omegaGauge" width="300" height="240"></canvas>
          </div>
        </div>
      </section>

      <section class="card pose-card">
        <h2>Odometry</h2>
        <canvas id="odometryChart" width="520" height="220"></canvas>
      </section>

      <section class="card pose-card">
        <h2>Speed Plan (Lap 1)</h2>
        <canvas id="speedPlanChart" width="520" height="220"></canvas>
      </section>

      <section class="card">
        <h2>Velocity</h2>
        <div class="metric-row">
          <div><span>Desired</span><strong id="desiredVelocityValue">-</strong></div>
          <div><span>Omega</span><strong id="omegaValue">-</strong></div>
        </div>
        <canvas id="velocityChart" width="520" height="220"></canvas>
        <canvas id="omegaChart" width="520" height="180"></canvas>
      </section>

      <section class="card">
        <h2>Battery</h2>
        <div class="metric-row">
          <div><span>Laps</span><strong id="lapCountValue">0</strong></div>
          <div><span>Total Dist</span><strong id="totalDistanceValue">0 mm</strong></div>
        </div>
        <canvas id="batteryChart" width="520" height="220"></canvas>
      </section>

      <section class="card">
        <h2>Line Detection</h2>
        <div class="metric-row">
          <div><span>x_hat</span><strong id="xhatValue">-</strong></div>
          <div><span>Detected</span><strong id="lineDetected">-</strong></div>
        </div>
        <div id="lineBars" class="line-bars"></div>
      </section>

      <section class="card params-card">
        <h2>Parameters</h2>
        <pre id="paramsView">-</pre>
      </section>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
  </html>
