services:
  sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /work
    volumes:
      - ../build:/work/build
      - ../src:/work/src
      - ../config:/work/config
      - ../CMakeLists.txt:/work/CMakeLists.txt

      - ../bin:/usr/local/bin
    command: bash
    stdin_open: true
    tty: true
  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    volumes:
      - ../web/public:/app/public
      - ../web/server.js:/app/server.js
    ports:
      - "8080:8080"
    restart: unless-stopped
